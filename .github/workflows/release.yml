name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify version matches tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $crate"
            exit 1
          fi
          echo "Releasing version $crate"

      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --locked

  build:
    name: Build ${{ matrix.target }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nasm
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux) sudo apt-get update && sudo apt-get install -y nasm ;;
            macOS) brew install nasm ;;
            Windows) choco install nasm -y ;;
          esac

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package archive
        uses: ./.github/actions/package
        with:
          target: ${{ matrix.target }}

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: archive-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  release:
    name: Publish release
    needs:
      - build
      - crates-io
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download archives
        uses: actions/download-artifact@v7
        with:
          pattern: archive-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        working-directory: dist
        run: |
          shasum -a 256 * > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            dist/*.tar.gz \
            dist/*.zip \
            dist/checksums.txt

  crates-io:
    name: Publish crate
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check whether version is already published
        id: crate
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          status="$(curl --silent --show-error \
            --user-agent "primage-release/${version} (https://github.com/${GITHUB_REPOSITORY})" \
            --output /dev/null --write-out '%{http_code}' \
            "https://crates.io/api/v1/crates/primage/${version}")"
          case "$status" in
            200) echo "published=true" >> "$GITHUB_OUTPUT" ;;
            404) echo "published=false" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::crates.io returned HTTP ${status}"
              exit 1
              ;;
          esac

      - name: Publish to crates.io
        if: steps.crate.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  homebrew:
    name: Update Homebrew cask
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}

    steps:
      - name: Download archives
        uses: actions/download-artifact@v7
        with:
          pattern: archive-*
          path: dist
          merge-multiple: true

      - name: Render cask
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          sha_darwin_arm="$(shasum -a 256 "dist/primage-aarch64-apple-darwin.tar.gz" | awk '{print $1}')"
          sha_darwin_intel="$(shasum -a 256 "dist/primage-x86_64-apple-darwin.tar.gz" | awk '{print $1}')"
          sha_linux_arm="$(shasum -a 256 "dist/primage-aarch64-unknown-linux-gnu.tar.gz" | awk '{print $1}')"
          sha_linux_intel="$(shasum -a 256 "dist/primage-x86_64-unknown-linux-gnu.tar.gz" | awk '{print $1}')"
          mkdir -p out/Casks
          cat > out/Casks/primage.rb <<EOF
          cask "primage" do
            version "${version}"

            on_macos do
              on_arm do
                sha256 "${sha_darwin_arm}"
                url "https://github.com/imfing/primage/releases/download/v#{version}/primage-aarch64-apple-darwin.tar.gz",
                    verified: "github.com/imfing/primage/"
              end
              on_intel do
                sha256 "${sha_darwin_intel}"
                url "https://github.com/imfing/primage/releases/download/v#{version}/primage-x86_64-apple-darwin.tar.gz",
                    verified: "github.com/imfing/primage/"
              end
            end

            on_linux do
              on_arm do
                sha256 "${sha_linux_arm}"
                url "https://github.com/imfing/primage/releases/download/v#{version}/primage-aarch64-unknown-linux-gnu.tar.gz",
                    verified: "github.com/imfing/primage/"
              end
              on_intel do
                sha256 "${sha_linux_intel}"
                url "https://github.com/imfing/primage/releases/download/v#{version}/primage-x86_64-unknown-linux-gnu.tar.gz",
                    verified: "github.com/imfing/primage/"
              end
            end

            name "primage"
            desc "A fast CLI for compressing and converting images"
            homepage "https://github.com/imfing/primage"

            binary "primage"

            postflight do
              if OS.mac?
                system_command "/usr/bin/xattr",
                               args: ["-dr", "com.apple.quarantine", "#{staged_path}/primage"]
              end
            end
          end
          EOF
          cat out/Casks/primage.rb

      - name: Push to homebrew tap
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/imfing/homebrew-tap.git" tap
          mkdir -p tap/Casks
          cp out/Casks/primage.rb tap/Casks/primage.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/primage.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date"
          else
            git commit -m "primage ${version}"
            git push
          fi
